services:
  lateknightshift:
    image: node:lts-alpine
    container_name: lateknightshift-dev
    restart: unless-stopped
    working_dir: /workspace
    command: ["/bin/sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    volumes:
      - /mnt/user/nas/projects/lateknightshift-prototype:/workspace:cached
    ports:
      - "4001:5173"
    networks:
      - unraid-network
    environment:
      - NODE_ENV=development

networks:
  unraid-network:
    external: true
