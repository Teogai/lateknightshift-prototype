<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Late Knight Shift — prototype</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

  <!-- Screen 1: Character select -->
  <div id="screen-select">
    <h1>Late Knight Shift</h1>
    <p>Choose your character</p>
    <button class="char-btn" id="btn-knight">The Knight — K + R + N + 2P</button>
    <p id="select-error"></p>
  </div>

  <!-- Screen 2: Game -->
  <div id="screen-game" class="hidden">
    <div id="layout">

      <div id="sidebar">
      </div>

      <div id="board-col">
        <div id="board"></div>
        <div id="status-bar"></div>
        <div id="action-hint"></div>
        <div id="hand"></div>
        <div id="bottom-bar">
          <button id="btn-redraw">Redraw (<span id="redraw-countdown">4</span>)</button>
          <button id="btn-undo">Undo</button>
        </div>
        <div id="debug-bar">
          <button id="btn-debug-move">Debug: Move Any</button>
          <button id="btn-debug-win">Debug: Win</button>
        </div>
        <div id="deck-info"></div>
      </div>

    </div>
  </div>

  <!-- Promotion picker modal -->
  <div id="promotion-modal" class="hidden">
    <div id="promotion-box">
      <p>Choose promotion piece</p>
      <div id="promotion-choices">
        <button class="promo-btn" data-promo="q"><img src="./pieces/Chess_qlt60.png" alt="Queen"></button>
        <button class="promo-btn" data-promo="r"><img src="./pieces/Chess_rlt60.png" alt="Rook"></button>
        <button class="promo-btn" data-promo="b"><img src="./pieces/Chess_blt60.png" alt="Bishop"></button>
        <button class="promo-btn" data-promo="n"><img src="./pieces/Chess_nlt60.png" alt="Knight"></button>
      </div>
    </div>
  </div>

  <!-- Pile viewer modal -->
  <div id="pile-modal" class="hidden">
    <div id="pile-box">
      <h3 id="pile-title"></h3>
      <div id="pile-grid" class="card-scroll-grid"></div>
      <button id="pile-close">Close</button>
    </div>
  </div>

  <!-- Screen: Map -->
  <div id="screen-map" class="hidden">
    <h1>Late Knight Shift</h1>
    <div id="map-header"></div>
    <div id="map-content"></div>
  </div>

  <!-- Screen: Room (event / shop / upgrade / treasure) -->
  <div id="screen-room" class="hidden">
    <h1>Late Knight Shift</h1>
    <div id="room-content"></div>
  </div>

  <!-- Screen: Defeat -->
  <div id="screen-defeat" class="hidden">
    <h1>Late Knight Shift</h1>
    <div id="defeat-content"></div>
  </div>

  <!-- Screen: Victory -->
  <div id="screen-victory" class="hidden">
    <h1>Victory!</h1>
    <p id="victory-message"></p>
    <button id="btn-victory-continue">Continue</button>
  </div>

  <!-- Screen: Run Complete -->
  <div id="screen-complete" class="hidden">
    <h1>Run Complete!</h1>
    <p id="complete-message"></p>
    <button id="btn-play-again">Play Again</button>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
